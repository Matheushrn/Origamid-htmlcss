<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>absolute</title>
    <style>
        div{
            border:2px solid #ccc;
            margin-top:40px;
            padding:20px 20px 40px 20px;

            /* faz com que o elemento do position:Absolute  fique a distancia do elemento PAI dele */
            position: relative;
        }

        span{
            background: #e7e7e7;
            border:2px solid #ccc;
            padding:10px;
            /* tira o elemento do fluxo normal dele e passa a não ocupar mais o espaço de onde ele deveria estar */
            position: absolute;
            top: -20px;
        }

    </style>
</head>
<body>
    <div>
        <span>Saiba Mais</span>
        <h1>Primeiro Conteúdo</h1>
    </div>
    <div>
        <span>Saiba Mais</span>
        <h1>Segundo Conteúdo</h1>
    </div>
   
</body>
</html>
