<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Relative</title>
    <style>
        div{
            border:2px solid #ccc;
            margin-top:40px;
            padding:20px 20px 40px 20px;
        }

        span{
            background: #e7e7e7;
            border:2px solid #ccc;
            padding:10px;
            /* faz o elemento ficar relativo ao local que ele está (e funciona os valores negativos) 
            

            Porém ele continua ocupando o espaço onde ele deveria estar
            */
            position: relative;
            top: -20px;
        }

    </style>
</head>
<body>
    <div>
        <span>Saiba Mais</span>
        <h1>Primeiro Conteúdo</h1>
    </div>
    <div>
        <span>Saiba Mais</span>
        <h1>Segundo Conteúdo</h1>
    </div>
   
</body>
</html>
